name: Sync upstream
on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git remote add upstream https://github.com/microsoft/playwright-cli.git || true
          git fetch upstream
          git merge upstream/main --no-edit
          git push
