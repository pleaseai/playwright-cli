name: Sync upstream
on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/microsoft/playwright-cli.git || true
          git fetch upstream --no-tags
          git merge upstream/main --no-edit
      - name: Update plugin.json version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          node -e "
            const fs = require('fs');
            const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
            const changed = plugin.version !== '$VERSION';
            plugin.version = '$VERSION';
            fs.writeFileSync('.claude-plugin/plugin.json', JSON.stringify(plugin, null, 2) + '\n');
            process.stdout.write(changed ? 'changed' : 'unchanged');
          " > /tmp/version_status
          STATUS=$(cat /tmp/version_status)
          echo "changed=$( [ "$STATUS" = "changed" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "changed" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .claude-plugin/plugin.json
            git commit -m "chore: sync plugin version to $VERSION"
          else
            echo "No version change, skipping commit"
          fi
      - name: Push changes
        run: git push
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          # 태그 생성 (없을 때만)
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping tag creation"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          # 릴리스 생성 (없을 때만) - 태그 생성 실패 후 재시도 가능
          RELEASE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          if [ "$RELEASE_STATUS" = "200" ]; then
            echo "Release ${TAG} already exists, skipping release creation"
            exit 0
          fi
          # upstream 릴리스 노트 가져오기 - 공개 API, 인증 불필요 (없으면 링크로 대체)
          UPSTREAM_NOTES=$(curl -sf "https://api.github.com/repos/microsoft/playwright-cli/releases/tags/${TAG}" \
            | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{ try{process.stdout.write(JSON.parse(d).body||'')}catch{} })" \
            2>/dev/null || echo "")
          if [ -z "$UPSTREAM_NOTES" ]; then
            NOTES="Synced from [microsoft/playwright-cli@${TAG}](https://github.com/microsoft/playwright-cli/releases/tag/${TAG})."
          else
            NOTES="$(printf '> Synced from [microsoft/playwright-cli@%s](https://github.com/microsoft/playwright-cli/releases/tag/%s).\n\n%s' "$TAG" "$TAG" "$UPSTREAM_NOTES")"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --latest
