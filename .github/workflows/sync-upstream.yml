name: Sync upstream
on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/microsoft/playwright-cli.git || true
          git fetch upstream
          git merge upstream/main --no-edit
      - name: Update plugin.json version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          node -e "
            const fs = require('fs');
            const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
            const changed = plugin.version !== '$VERSION';
            plugin.version = '$VERSION';
            fs.writeFileSync('.claude-plugin/plugin.json', JSON.stringify(plugin, null, 2) + '\n');
            process.stdout.write(changed ? 'changed' : 'unchanged');
          " > /tmp/version_status
          STATUS=$(cat /tmp/version_status)
          echo "changed=$( [ "$STATUS" = "changed" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "changed" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .claude-plugin/plugin.json
            git commit -m "chore: sync plugin version to $VERSION"
          else
            echo "No version change, skipping commit"
          fi
      - name: Push changes
        run: git push
      - name: Create tag and release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          # 이미 존재하는 태그라면 건너뜀
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping release"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "v${VERSION}" \
            --notes "Synced from [microsoft/playwright-cli@v${VERSION}](https://github.com/microsoft/playwright-cli/releases/tag/v${VERSION})." \
            --latest
